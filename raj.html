  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: 'Outfit', sans-serif; transition: background-color 0.8s ease, color 0.3s ease; }
    .skill-card { cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .skill-card:hover { transform: translateY(-8px) scale(1.03); }
    .skill-card:active { transform: scale(0.97); }
    .roadmap-line { position: absolute; left: 50%; width: 4px; top: 0; bottom: 0; transform: translateX(-50%); }
    .roadmap-node { animation: fadeSlide 0.6s ease forwards; opacity: 0; }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 20px rgba(255,255,255,0.1); } 50% { box-shadow: 0 0 40px rgba(255,255,255,0.25); } }

    .glow { animation: pulse-glow 2.5s ease-in-out infinite; }
    .hero-text { font-family: 'Space Mono', monospace; }
    .bg-particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle { position: absolute; border-radius: 50%; opacity: 0.15; animation: float 6s ease-in-out infinite; }
    section { position: relative; z-index: 1; }
    .theme-dark { background: #0f0f1a; color: #e8e8f0; }
    .theme-sql { background: #1a0a2e; color: #e8d5ff; }
    .theme-powerbi { background: #0a1e0a; color: #d5ffe0; }
    .theme-python { background: #1e1a0a; color: #fff8d5; }
    .theme-web { background: #0a1a1e; color: #d5f0ff; }
    .theme-office { background: #1e0a0a; color: #ffd5d5; }

 <body class="h-full overflow-auto theme-dark" id="app-body">

   <h1 class="hero-text text-4xl md:text-6xl font-bold mb-3" id="hero-title">P. Raj Gopinath</h1>
   <p class="text-xl md:text-2xl opacity-80 mb-2" id="hero-subtitle">Future Data Scientist 🚀</p>

  <script>
    // Theme switching
    function changeTheme(theme) {
      const body = document.getElementById('app-body');
      body.className = 'h-full overflow-auto theme-' + theme;
      generateParticles(theme);
    }

    // Particles
    const themeColors = {
      dark: ['#8b5cf6','#06b6d4'],
      sql: ['#a855f7','#7c3aed'],
      powerbi: ['#22c55e','#10b981'],
      python: ['#eab308','#f59e0b'],
      web: ['#06b6d4','#0ea5e9'],
      office: ['#ef4444','#f97316']
    };

    function generateParticles(theme) {
      const container = document.getElementById('particles');
      container.innerHTML = '';
      const colors = themeColors[theme] || themeColors.dark;
      for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 80 + 20;
        p.style.cssText = `width:${size}px;height:${size}px;background:${colors[i%2]};left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${4+Math.random()*4}s;`;
        container.appendChild(p);
      }
    }
    generateParticles('dark');

    // Element SDK
    const defaultConfig = {
      hero_title: 'P. Raj Gopinath',
      hero_subtitle: 'Future Data Scientist 🚀',
      background_color: '#0f0f1a',
      text_color: '#e8e8f0',
      accent_color: '#8b5cf6',
      surface_color: '#1e1b4b',
      font_family: 'Outfit',
      font_size: 16
    };

    async function onConfigChange(config) {
      const title = document.getElementById('hero-title');
      const subtitle = document.getElementById('hero-subtitle');
      title.textContent = config.hero_title || defaultConfig.hero_title;
      subtitle.textContent = config.hero_subtitle || defaultConfig.hero_subtitle;
      const font = config.font_family || defaultConfig.font_family;
      document.body.style.fontFamily = `${font}, Outfit, sans-serif`;
      const size = config.font_size || defaultConfig.font_size;
      document.body.style.fontSize = size + 'px';
      title.style.fontSize = (size * 3.5) + 'px';
      subtitle.style.fontSize = (size * 1.4) + 'px';
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange,
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({background_color:v}); }},
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({text_color:v}); }},
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({accent_color:v}); }}
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({font_family:v}); }},
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({font_size:v}); }}
      }),
      mapToEditPanelValues: (config) => new Map([
        ['hero_title', config.hero_title || defaultConfig.hero_title],
        ['hero_subtitle', config.hero_subtitle || defaultConfig.hero_subtitle]
      ])
    });

    // Smooth scroll
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        document.querySelector(a.getAttribute('href')).scrollIntoView({behavior:'smooth'});
      });
    });

    lucide.createIcons();
  </script>
